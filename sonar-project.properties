# =======================================================
# sonar-project.properties
# Configuration SonarCloud pour BeeStore - DevSecOps
# Fichier à la RACINE du projet (même niveau que pom.xml)
# =======================================================

# ========== IDENTIFICATION DU PROJET ==========
# Clé unique du projet sur SonarCloud
sonar.projectKey=amdouni-bilel_formation-devsecops

# Nom affiché sur le dashboard SonarCloud
sonar.projectName=formation-devsecops - Gestion des Produits (DevSecOps)

# Description du projet
sonar.projectDescription=Projet DevSecOps de gestion de produits avec couverture de code (JaCoCo), analyse de sécurité (SpotBugs + FindSecBugs), tests BDD (Cucumber) et validation des dépendances (OWASP Dependency-Check).

# Version du projet
sonar.projectVersion=1.0.0

# ========== CONFIGURATION SONARCLOUD ==========
# Organisation SonarCloud (votre login GitHub)
sonar.organization=amdouni-bilel

# URL SonarCloud
sonar.host.url=https://sonarcloud.io

# ========== LOCALISATION DES SOURCES ==========
# Répertoire des sources Java (code principal)
sonar.sources=src/main/java

# Répertoire des tests unitaires
sonar.tests=src/test/java

# Répertoire des ressources de test (Gherkin/Cucumber)
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/test/**,**/*.feature

# ========== COUVERTURE DE CODE (JACOCO) ==========
# Rapport de couverture JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ========== SÉCURITÉ DES DÉPENDANCES (OWASP) ==========
# Rapport Dependency-Check JSON
sonar.dependencyCheck.jsonReportPath=target/dependency-check-report/dependency-check-report.json

# Rapport Dependency-Check HTML
sonar.dependencyCheck.htmlReportPath=target/dependency-check-report/dependency-check-report.html

# ========== CONFIGURATION GÉNÉRALE ==========
# Encodage du code source
sonar.sourceEncoding=UTF-8

# Langage du projet
sonar.language=java

# ========== EXCLUSIONS D'ANALYSE ==========
# Classes à exclure de l'analyse : configuration, application principale, DTOs, entités (pas de logique à tester)
sonar.exclusions=\
  **/config/**,\
  **/FormationDevsecopsApplication.java,\
  **/*DTO.java,\
  **/entity/**,\
  **/exception/**,\
  **/dto/**

# Exclusions spécifiques de couverture (même liste)
sonar.coverage.exclusions=\
  **/config/**,\
  **/FormationDevsecopsApplication.java,\
  **/*DTO.java,\
  **/entity/**,\
  **/exception/**,\
  **/dto/**

